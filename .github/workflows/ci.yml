name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: darchhiwa
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_DB: darchhiwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://darchhiwa:ci-postgres-password@localhost:5432/darchhiwa?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-placeholder-secret-do-not-use-in-prod
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t resto:ci .
