services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in your .env file}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    volumes:
      # Persist the JSON database and uploaded images across restarts/deploys
      - resto-data:/app/data
      - resto-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  resto-data:
  resto-uploads:
